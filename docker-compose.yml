services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tcms_erp}
      POSTGRES_USER: ${POSTGRES_USER:-tcms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tcms_local_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tcms} -d ${POSTGRES_DB:-tcms_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file:
      - .env.example
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./apps/backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file:
      - .env.example
    command: celery -A config worker -l info
    volumes:
      - ./apps/backend:/app
    depends_on:
      - backend
      - redis

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file:
      - .env.example
    command: celery -A config beat -l info
    volumes:
      - ./apps/backend:/app
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    env_file:
      - .env.example
    command: npm run dev
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
